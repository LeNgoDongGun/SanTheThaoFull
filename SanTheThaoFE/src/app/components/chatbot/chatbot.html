<div class="chat-bubble" (click)="toggleChat()" *ngIf="!isOpen">
  💬 <span class="bubble-text">Hỏi AI</span>
</div>

<div class="chat-window" *ngIf="isOpen">
  <div class="chat-header">
    <div class="header-info">
      <span class="bot-status-dot"></span>
      <strong>Trợ lý Sân Thể Thao (Llama 3.1)</strong>
    </div>
    <button class="btn-close" (click)="toggleChat()">×</button>
  </div>

  <div class="chat-body" #chatContainer>
    <div *ngFor="let msg of messages" [ngClass]="['message-wrapper', msg.sender]">
      <div class="message-bubble">
        {{ msg.text }}
      </div>
    </div>
    
    <div class="message-wrapper bot" *ngIf="loading">
      <div class="message-bubble typing-dots">
        <span>.</span><span>.</span><span>.</span>
      </div>
    </div>
  </div>

  <div class="chat-footer">
    <input type="text" [(ngModel)]="userPrompt" (keyup.enter)="sendMessage()" 
           placeholder="Hỏi về giá sân, lịch đặt..." [disabled]="loading">
    <button (click)="sendMessage()" [disabled]="loading || !userPrompt.trim()">Gửi</button>
  </div>
</div>
