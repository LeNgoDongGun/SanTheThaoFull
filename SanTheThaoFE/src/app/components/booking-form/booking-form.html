<div class="booking-container" style="max-width:560px;margin:auto;padding:32px 24px">

  <div class="breadcrumb" style="font-size:0.85rem;color:#64748b;margin-bottom:20px">
    <a routerLink="/courts" style="color:#3b82f6;text-decoration:none">← Quay lại danh sách sân</a>
  </div>

  <h2 style="font-weight:700;margin-bottom:24px">🗓️ Đặt sân</h2>

  <div *ngIf="court" class="court-card"
    style="background:white;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:24px;display:flex;gap:16px;align-items:center">
    <div class="court-icon"
      style="width:72px;height:72px;border-radius:10px;background:linear-gradient(135deg,#e0e7ff,#c7d2fe);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0">
      {{ court.sportType?.icon || '🏟️' }}
    </div>
    <div class="court-info">
      <h3 style="margin:0 0 4px;font-size:1rem;font-weight:700">{{ court.name }}</h3>
      <p class="sport-type" style="margin:0 0 4px;color:#64748b;font-size:0.85rem">{{ court.sportType?.name }}</p>
      <p class="price" style="margin:0;color:#3b82f6;font-weight:700">{{ court.pricePerHour | number }}đ/giờ</p>
    </div>
  </div>

  <div *ngIf="!auth.isLoggedIn()" class="alert-warn"
    style="background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:14px;margin-bottom:20px;font-size:0.9rem">
    ⚠️ Bạn cần <a routerLink="/login" style="color:#d97706;font-weight:600">đăng nhập</a> để tiến hành đặt sân.
  </div>

  <div class="booking-card" style="background:white;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.08)">

    <div class="form-group" style="margin-bottom:16px">
      <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:6px">📅 Ngày đặt</label>
      <input type="date" [(ngModel)]="bookingData.bookingDate" [min]="today"
        style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem;box-sizing:border-box">
    </div>

    <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="form-group">
        <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:6px">🕐 Giờ bắt đầu</label>
        <input type="time" [(ngModel)]="bookingData.startTime" (change)="calcPrice()"
          style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem;box-sizing:border-box">
      </div>
      <div class="form-group">
        <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:6px">🕐 Giờ kết thúc</label>
        <input type="time" [(ngModel)]="bookingData.endTime" (change)="calcPrice()"
          style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem;box-sizing:border-box">
      </div>
    </div>

    <div class="form-group" style="margin-bottom:20px">
      <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:6px">📝 Ghi chú (tùy chọn)</label>
      <textarea [(ngModel)]="bookingData.note" rows="3" placeholder="Ghi chú thêm (ví dụ: thuê thêm vợt, bóng...)"
        style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem;resize:none;box-sizing:border-box"></textarea>
    </div>

    <!-- Chọn phương thức thanh toán -->
    <div class="form-group" style="margin-bottom:20px">
      <label class="section-label" style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:6px">💳 Phương thức thanh toán</label>
      <div class="payment-methods" style="display: flex; flex-direction: column; gap: 8px;">
        <label class="payment-option" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="radio" name="paymentMethod" value="Cash" [(ngModel)]="bookingData.paymentMethod">
          <span class="option-text">💵 Thanh toán tiền mặt tại quầy</span>
        </label>
        <label class="payment-option" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="radio" name="paymentMethod" value="Momo" [(ngModel)]="bookingData.paymentMethod">
          <span class="option-text">🔮 Thanh toán online qua Ví MoMo</span>
        </label>
      </div>
    </div>

    <div *ngIf="bookingData.totalPrice > 0" class="total-price-box"
      style="background:#eff6ff;border-radius:8px;padding:14px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">
      <span class="label" style="color:#1e40af;font-weight:600">💰 Tổng tiền tạm tính:</span>
      <span class="amount" style="color:#1e40af;font-size:1.2rem;font-weight:700">{{ bookingData.totalPrice | number }}đ</span>
    </div>

    <button (click)="submit()" [disabled]="!auth.isLoggedIn() || loading" class="btn-submit"
      style="width:100%;background:#3b82f6;color:white;border:none;padding:13px;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:700"
      [style.opacity]="!auth.isLoggedIn() ? '0.5' : '1'">
      {{ loading ? 'Đang xử lý hóa đơn...' : '✅ Xác nhận đặt sân' }}
    </button>

    <p *ngIf="errorMsg" class="error-text" style="margin-top:12px;color:#ef4444;font-size:0.875rem;text-align:center">
      {{ errorMsg }}
    </p>
  </div>
</div>
