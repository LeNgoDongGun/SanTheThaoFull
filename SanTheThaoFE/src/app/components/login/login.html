<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <div class="login-logo">🏟️</div>
      <h2 class="login-title">Đăng nhập</h2>
      <p class="login-subtitle">Hệ thống đặt sân thể thao</p>
    </div>

    <div *ngIf="errorMsg" class="error-alert">
      {{ errorMsg }}
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" [(ngModel)]="email" placeholder="email@example.com" class="form-input">
    </div>

    <div class="form-group-password">
      <label class="form-label">Mật khẩu</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" 
             (keyup.enter)="submit()" class="form-input">
    </div>

    <button (click)="submit()" [disabled]="loading" class="btn-submit">
      {{ loading ? 'Đang xử lý...' : 'Đăng nhập' }}
    </button>

    <p class="register-text">
      Chưa có tài khoản?
      <a routerLink="/register" class="register-link">Đăng ký ngay</a>
    </p>

  </div>
</div>
